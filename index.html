<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>חבילת השת״פ של מנטי — שאלון תכנון מחקר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f172a; --card:#1e293bcc; --line:#334155;
    --sky:#38bdf8; --sky2:#0ea5e9; --ink:#e2e8f0; --muted:#94a3b8;
    --good:#34d399; --pink:#f472b6; --amber:#fbbf24;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(160deg,#0b1220,#0f172a 40%,#0b1220);
    color:var(--ink);font-family:Heebo,system-ui,Arial,sans-serif;line-height:1.6;}
  .wrap{max-width:840px;margin:0 auto;padding:20px 18px 80px;}
  .langbar{display:flex;justify-content:flex-end;gap:0;margin:6px 0 0;}
  .langbar .seg button{min-width:54px}
  header.hero{text-align:center;padding:18px 18px 12px;}
  .hero h1{font-size:30px;font-weight:800;margin:0 0 6px;
    background:linear-gradient(90deg,var(--sky),#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p{color:var(--muted);margin:4px 0 0;font-size:15px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin:16px 0;backdrop-filter:blur(4px);}
  .card h2{font-size:18px;margin:0 0 4px;display:flex;align-items:center;gap:8px;}
  .card .hint{color:var(--muted);font-size:13px;margin:0 0 14px;}
  .num{display:inline-flex;width:26px;height:26px;border-radius:50%;background:var(--sky2);
    color:#06283d;font-weight:800;align-items:center;justify-content:center;font-size:14px;}
  label.q{display:block;font-weight:500;margin:14px 0 6px;}
  input[type=text],input[type=number],textarea,select{
    width:100%;background:#0b1220;border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:10px 12px;font-family:inherit;font-size:15px;}
  textarea{min-height:64px;resize:vertical;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px #38bdf833;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row>div{flex:1;min-width:160px;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0;}
  .chip{cursor:pointer;border:1px solid var(--line);background:#0b1220;border-radius:999px;
    padding:9px 15px;font-size:14px;user-select:none;transition:.15s;}
  .chip:hover{border-color:var(--sky);}
  .chip.on{background:linear-gradient(90deg,var(--sky2),#2563eb);border-color:var(--sky);color:#fff;font-weight:600;}
  .chip.on.pink{background:linear-gradient(90deg,var(--pink),#db2777);}
  .sub{margin:8px 0 0;padding:12px;border:1px dashed var(--line);border-radius:12px;background:#0b122080;}
  .sub.hidden{display:none;}
  .minirow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:14px;}
  .minirow select{width:auto;min-width:120px;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{background:#0b1220;color:var(--muted);border:none;padding:9px 16px;cursor:pointer;font-family:inherit;font-size:14px;}
  .seg button.on{background:var(--sky2);color:#06283d;font-weight:700;}
  .check{display:flex;align-items:center;gap:8px;margin:8px 0;cursor:pointer;font-size:14px;}
  .check input{width:18px;height:18px;accent-color:var(--sky);}
  .cta{display:block;width:100%;margin:22px 0 0;padding:15px;border:none;border-radius:14px;cursor:pointer;
    background:linear-gradient(90deg,var(--sky),#6366f1);color:#fff;font-weight:800;font-size:17px;font-family:inherit;}
  .cta:hover{filter:brightness(1.07);}
  .info{background:linear-gradient(160deg,#0b1b2e,#101c33);border:1px solid #1e3a5f;}
  .track{margin:10px 0;} .track h3{margin:0 0 4px;font-size:15px;display:flex;align-items:center;gap:8px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .track p{margin:0;color:var(--muted);font-size:13.5px;}
  .simgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin:8px 0;}
  .simcard{cursor:pointer;border:1px solid var(--line);background:#0b1220;border-radius:12px;padding:11px 13px;transition:.15s;}
  .simcard:hover{border-color:var(--sky);}
  .simcard.on{border-color:var(--sky);background:linear-gradient(160deg,#0c2236,#0b1220);box-shadow:0 0 0 2px #38bdf855;}
  .simcard .t{font-weight:600;font-size:14px;}
  .simcard .d{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .simcard .tag{font-size:11px;color:#06283d;background:var(--sky);border-radius:6px;padding:1px 6px;margin-inline-start:6px;}
  #out.hidden{display:none;}
  pre{background:#020617;border:1px solid var(--line);border-radius:12px;padding:14px;overflow:auto;
    direction:ltr;text-align:left;font-size:12px;max-height:340px;color:#cbd5e1;}
  .outbtns{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;}
  .outbtns button{flex:1;min-width:160px;padding:12px;border-radius:12px;border:1px solid var(--line);
    background:#0b1220;color:var(--ink);font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;}
  .outbtns button.primary{background:var(--good);color:#053;border:none;}
  .note{color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar"><div class="seg" id="langSeg">
    <button type="button" data-v="he" class="on">עברית</button>
    <button type="button" data-v="en">English</button>
  </div></div>

  <header class="hero">
    <h1 data-i18n="hero_t"></h1>
    <p data-i18n="hero_s"></p>
  </header>

  <div class="card info">
    <h2 data-i18n="sims_title"></h2>
    <p class="hint" data-i18n="sims_intro"></p>
    <div class="track"><h3><span class="dot" style="background:var(--pink)"></span> <span data-i18n="trk_parent_h"></span></h3>
      <p data-i18n-html="trk_parent_p"></p></div>
    <div class="track"><h3><span class="dot" style="background:var(--sky)"></span> <span data-i18n="trk_ther_h"></span></h3>
      <p data-i18n-html="trk_ther_p"></p></div>
    <div class="track"><h3><span class="dot" style="background:var(--amber)"></span> <span data-i18n="trk_care_h"></span></h3>
      <p data-i18n-html="trk_care_p"></p></div>
    <p class="note" data-i18n="sims_note"></p>
  </div>

  <div class="card">
    <h2><span class="num">1</span> <span data-i18n="s1_t"></span></h2>
    <p class="hint" data-i18n="s1_h"></p>
    <label class="q" data-i18n="l_collab"></label>
    <input type="text" id="collaborator" data-ph="ph_collab">
    <div class="row">
      <div><label class="q" data-i18n="l_setting"></label><input type="text" id="setting" data-ph="ph_setting"></div>
      <div><label class="q" data-i18n="l_studylang"></label>
        <select id="language"><option value="he" data-i18n="opt_he"></option><option value="en" data-i18n="opt_en"></option></select></div>
    </div>
    <label class="q" data-i18n="l_pop"></label>
    <input type="text" id="population" data-ph="ph_pop">
    <div class="row">
      <div><label class="q" data-i18n="l_n"></label><input type="number" id="n" min="1" placeholder="40"></div>
      <div><label class="q" data-i18n="l_when"></label><input type="text" id="when" placeholder="2026-06-07"></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">2</span> <span data-i18n="s2_t"></span></h2>
    <p class="hint" data-i18n="s2_h"></p>
    <label class="q" data-i18n="l_whichsim"></label>
    <div class="simgrid" id="simGrid"></div>
    <div id="simOtherBox" class="sub hidden"><input type="text" id="simOther" data-ph="ph_simother"></div>
    <div class="row"><div><label class="q" data-i18n="l_nsess"></label>
      <select id="nSessions">
        <option value="1" data-i18n="sess1"></option><option value="2" data-i18n="sess2"></option>
        <option value="3" data-i18n="sess3"></option><option value="multiple" data-i18n="sessM"></option></select></div></div>
    <label class="q" data-i18n="l_goal"></label>
    <textarea id="goal" data-ph="ph_goal"></textarea>
    <label class="q" data-i18n="l_resval"></label>
    <textarea id="researchValue" data-ph="ph_resval"></textarea>
  </div>

  <div class="card">
    <h2><span class="num">3</span> <span data-i18n="s3_t"></span></h2>
    <p class="hint" data-i18n="s3_h"></p>
    <div class="chips" id="prepostChips"></div>
    <div id="prepostSubs"></div>
  </div>

  <div class="card">
    <h2><span class="num">4</span> <span data-i18n="s4_t"></span></h2>
    <p class="hint" data-i18n="s4_h"></p>
    <label class="check"><input type="checkbox" id="po_acceptability" checked> <span data-i18n="po_acc"></span></label>
    <label class="check"><input type="checkbox" id="po_perceived_change"> <span data-i18n="po_perc"></span></label>
    <label class="check"><input type="checkbox" id="po_felt_change"> <span data-i18n="po_felt"></span></label>
  </div>

  <div class="card">
    <h2><span class="num">5</span> <span data-i18n="s5_t"></span></h2>
    <p class="hint" data-i18n="s5_h"></p>
    <div class="seg" id="haveScalesSeg">
      <button type="button" data-v="no" class="on" data-i18n="hs_no"></button>
      <button type="button" data-v="yes" data-i18n="hs_yes"></button>
    </div>
    <div id="haveScalesBox" class="sub hidden"><textarea id="scalesNote" data-ph="ph_scales"></textarea></div>
  </div>

  <div class="card">
    <h2><span class="num">6</span> <span data-i18n="s6_t"></span></h2>
    <div class="row">
      <div><label class="q" data-i18n="l_timing"></label>
        <div class="seg" id="timingSeg">
          <button type="button" data-v="pre_post" class="on" data-i18n="tm_prepost"></button>
          <button type="button" data-v="post_only" data-i18n="tm_post"></button></div></div>
      <div><label class="q" data-i18n="l_control"></label>
        <div class="seg" id="controlSeg">
          <button type="button" data-v="no" class="on" data-i18n="ctl_no"></button>
          <button type="button" data-v="yes" data-i18n="ctl_yes"></button></div></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">7</span> <span data-i18n="s7_t"></span></h2>
    <p class="hint" data-i18n="s7_h"></p>
    <div class="chips" id="demoChips"></div>
  </div>

  <div class="card">
    <h2><span class="num">8</span> <span data-i18n="s8_t"></span></h2>
    <p class="hint" data-i18n="s8_h"></p>
    <div class="seg" id="fundingSeg">
      <button type="button" data-v="no" class="on" data-i18n="fn_no"></button>
      <button type="button" data-v="yes" data-i18n="fn_yes"></button>
    </div>
    <div id="fundingBox" class="sub hidden"><input type="text" id="fundingSource" data-ph="ph_fund"></div>
  </div>

  <div class="card">
    <h2><span class="num">9</span> <span data-i18n="s9_t"></span></h2>
    <p class="hint" data-i18n="s9_h"></p>
    <textarea id="notes" data-ph="ph_notes"></textarea>
  </div>

  <button class="cta" id="submit" data-i18n="cta"></button>

  <div id="out" class="hidden">
    <div class="card">
      <h2 data-i18n="out_t"></h2>
      <p class="note" data-i18n="out_s"></p>
      <div class="outbtns">
        <button class="primary" id="download" data-i18n="btn_dl"></button>
        <button id="copy" data-i18n="btn_copy"></button>
      </div>
      <pre id="json"></pre>
    </div>
  </div>
</div>

  l_resval:"What's the research value / contribution? (why it matters and what's new)", ph_resval:"e.g. first to test whether playing the parent role in an AI simulation raises self-efficacy and reduces apprehension among trainees.",
  s3_t:"What to measure — pre & post", s3_h:"Pick the outcomes that matter to you. For each we'll ask whether it's expected to go up or down.",
  s4_t:"Post-simulation blocks", s4_h:"Measures taken only at the end (feedback, perceived change).",
  po_acc:"Simulation acceptability (how real, useful, and recommendable it felt)", po_perc:"Perceived change (did anxiety drop / curiosity rise, retrospectively)", po_felt:"Direct felt change (did it shift something)",
  s5_t:"Existing measures", s5_h:"Do you have a specific questionnaire or items you want to use?", hs_no:"No — suggest for me", hs_yes:"Yes — I have", ph_scales:"Describe, or attach later.",
  s6_t:"Study design", l_timing:"When to measure?", tm_prepost:"Pre & post", tm_post:"Post only", l_control:"Comparison / control group?", ctl_no:"No (pilot)", ctl_yes:"Yes",
  s7_t:"Background details to collect", s7_h:"Which demographics to collect.",
  s8_t:"Funding", s8_h:"Is there a funding source for the study?", fn_no:"None / not sure", fn_yes:"Yes — there is", ph_fund:"What is the funding source? (fund, grant, institution, amount if known)",
  s9_t:"Notes", s9_h:"Anything important to include — or to avoid.", ph_notes:"Free space for notes, requests, or emphases.",
  cta:"Build my study draft ⟶", out_t:"✓ Got it — here's what we'll build from you", out_s:"This file (answers.json) goes to the agent, which assembles a full study draft + a short meeting agenda.",
  btn_dl:"⬇ Download answers.json", btn_copy:"Copy",
  dir_up:"Up ▲", dir_dn:"Down ▼", prim:"Primary (headline) outcome", expdir:"Expected direction:", lblph:"Measure name" }
};

const SIMS = [
  {k:"lia", t:{he:"ליה",en:"Lia"}, d:{he:"חרדה בזמן מלחמה (ילדה בת 7)",en:"Wartime anxiety (girl, age 7)"}, track:{he:"הורים",en:"Parents"}},
  {k:"danny", t:{he:"דני",en:"Danny"}, d:{he:"ניכור הורי (נער בן 14)",en:"Parental alienation (boy, 14)"}, track:{he:"הורים",en:"Parents"}},
  {k:"evelyn", t:{he:"אוולין",en:"Evelyn"}, d:{he:"גבולות והתנהגות מסוכנת (בת 15)",en:"Boundaries & risky behavior (15)"}, track:{he:"הורים",en:"Parents"}},
  {k:"yoav", t:{he:"יואב",en:"Yoav"}, d:{he:"דיאלוג סוקרטי באימון מטפלים (CPT)",en:"Socratic dialogue in CPT training"}, track:{he:"מטפלים",en:"Clinicians"}},
  {k:"carol", t:{he:"ד״ר דוֵק (קרול)",en:"Dr. Dweck (Carol)"}, d:{he:"זיהוי צרכים פסיכולוגיים",en:"Identifying psychological needs"}, track:{he:"מטפלים",en:"Clinicians"}},
  {k:"rina", t:{he:"רינה",en:"Rina"}, d:{he:"דיאלוג תומך-צרכים לסטודנטים לייעוץ",en:"Needs-supportive dialogue (counseling)"}, track:{he:"מטפלים",en:"Clinicians"}},
  {k:"up", t:{he:"סוויטת UP",en:"UP suite"}, d:{he:"איתן ו-8 מודולים לוויסות רגשי",en:"Ethan & 8 emotion-regulation modules"}, track:{he:"מטפלים",en:"Clinicians"}},
  {k:"julie", t:{he:"ג'ולי",en:"Julie"}, d:{he:"הכשרת מנחי אומנה",en:"Foster-care coordinator training"}, track:{he:"אומנה",en:"Foster"}},
  {k:"other", t:{he:"סימולציה אחרת",en:"Another simulation"}, d:{he:"עוד לא בטוח/ה / אחר",en:"Not sure yet / other"}, track:{he:"",en:""}},
  {k:"new", t:{he:"סימולציה חדשה",en:"A new simulation"}, d:{he:"נבנה יחד, מותאמת לנושא",en:"We'll build it together"}, track:{he:"",en:""}},
];
const PREPOST = [
  {c:"self_efficacy", l:{he:"מסוגלות עצמית",en:"Self-efficacy"}, dir:"increase"},
  {c:"apprehension",  l:{he:"חשש / חרדה",en:"Apprehension / anxiety"}, dir:"decrease"},
  {c:"mentalization", l:{he:"מנטליזציה (יכולת רפלקטיבית)",en:"Mentalization (reflective capacity)"}, dir:"increase"},
  {c:"custom",        l:{he:"משהו אחר (נכתוב לך פריטים)",en:"Something else (we'll draft items)"}, dir:"increase", custom:true},
];
const DEMOG = [
  {k:"age",l:{he:"גיל",en:"Age"}},{k:"gender",l:{he:"מגדר",en:"Gender"}},{k:"parent_status",l:{he:"הורות",en:"Parent status"}},
  {k:"marital_status",l:{he:"מצב משפחתי",en:"Marital status"}},{k:"religion",l:{he:"דת",en:"Religion"}},
  {k:"religiosity",l:{he:"רמת דתיות",en:"Religiosity"}},{k:"prior_experience",l:{he:"ניסיון מקצועי קודם",en:"Prior professional experience"}},
];
const $ = id => document.getElementById(id);
let LANG = "he";
const state = {haveScales:"no", timing:"pre_post", control:"no", funding:"no", sim:null,
  prepost:{}, demog:new Set(["age","gender","parent_status","prior_experience"])};

function applyLang(lang){
  LANG = lang; const t = T[lang];
  document.documentElement.lang = lang; document.documentElement.dir = t.dir;
  document.querySelectorAll("[data-i18n]").forEach(e=>{ const k=e.getAttribute("data-i18n"); if(t[k]!=null) e.textContent=t[k]; });
  document.querySelectorAll("[data-i18n-html]").forEach(e=>{ const k=e.getAttribute("data-i18n-html"); if(t[k]!=null) e.innerHTML=t[k]; });
  document.querySelectorAll("[data-ph]").forEach(e=>{ const k=e.getAttribute("data-ph"); if(t[k]!=null) e.placeholder=t[k]; });
  renderSims(); renderChips(); renderDemog(); renderSubs();
  $("langSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.v===lang));
}

function seg(id, key, onChange){
  $(id).querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $(id).querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); state[key]=b.dataset.v; if(onChange) onChange(b.dataset.v);
  });
}
seg("haveScalesSeg","haveScales", v=>$("haveScalesBox").classList.toggle("hidden", v!=="yes"));
seg("timingSeg","timing"); seg("controlSeg","control");
seg("fundingSeg","funding", v=>$("fundingBox").classList.toggle("hidden", v!=="yes"));
$("langSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>applyLang(b.dataset.v));

function renderSims(){
  const sg=$("simGrid"); sg.innerHTML="";
  SIMS.forEach(s=>{
    const c=document.createElement("div"); c.className="simcard"+(state.sim===s.k?" on":""); c.dataset.k=s.k;
    const trk=s.track[LANG]?'<span class="tag">'+s.track[LANG]+'</span>':'';
    c.innerHTML=`<div class="t">${s.t[LANG]}${trk}</div><div class="d">${s.d[LANG]}</div>`;
    c.onclick=()=>{ sg.querySelectorAll(".simcard").forEach(x=>x.classList.remove("on"));
      c.classList.add("on"); state.sim=s.k;
      $("simOtherBox").classList.toggle("hidden", !(s.k==="other"||s.k==="new")); };
    sg.appendChild(c);
  });
}
function renderChips(){
  const pc=$("prepostChips"); pc.innerHTML="";
  PREPOST.forEach(o=>{
    const chip=document.createElement("div"); chip.className="chip"+(state.prepost[o.c]?" on":"")+(o.custom&&state.prepost[o.c]?" pink":"");
    chip.textContent=o.l[LANG]; chip.dataset.c=o.c;
    chip.onclick=()=>{
      const on=chip.classList.toggle("on");
      if(o.custom) chip.classList.toggle("pink", on);
      if(on){ state.prepost[o.c]={direction:o.dir, primary:false, label:o.custom?"":o.l[LANG]}; }
      else { delete state.prepost[o.c]; }
      renderSubs();
    };
    pc.appendChild(chip);
  });
}
function renderDemog(){
  const dc=$("demoChips"); dc.innerHTML="";
  DEMOG.forEach(d=>{
    const chip=document.createElement("div"); chip.className="chip"+(state.demog.has(d.k)?" on":""); chip.textContent=d.l[LANG];
    chip.onclick=()=>{ const on=chip.classList.toggle("on"); on?state.demog.add(d.k):state.demog.delete(d.k); };
    dc.appendChild(chip);
  });
}
function renderSubs(){
  const ps=$("prepostSubs"); ps.innerHTML=""; const t=T[LANG];
  PREPOST.filter(o=>state.prepost[o.c]).forEach(o=>{
    const v=state.prepost[o.c];
    const d=document.createElement("div"); d.className="sub"; d.id="sub-"+o.c;
    d.innerHTML=`<div class="minirow"><strong>${o.l[LANG]}</strong>
      ${o.custom?'<input type="text" placeholder="'+t.lblph+'" style="max-width:220px" id="lbl-'+o.c+'">':''}
      <span>${t.expdir}</span>
      <select id="dir-${o.c}"><option value="increase">${t.dir_up}</option><option value="decrease">${t.dir_dn}</option></select>
      <label class="check" style="margin:0"><input type="checkbox" id="prim-${o.c}"> ${t.prim}</label></div>`;
    ps.appendChild(d);
    $("dir-"+o.c).value=v.direction; $("dir-"+o.c).onchange=e=>v.direction=e.target.value;
    $("prim-"+o.c).checked=!!v.primary; $("prim-"+o.c).onchange=e=>v.primary=e.target.checked;
    if(o.custom){ const li=$("lbl-"+o.c); li.value=v.label||""; li.oninput=e=>v.label=e.target.value; }
  });
}

function simName(){ const s=SIMS.find(x=>x.k===state.sim); if(!s) return "";
  if(s.k==="other"||s.k==="new") return $("simOther").value.trim()||s.t[LANG]; return s.t[LANG]; }
function buildAnswers(){
  const outcomes=[];
  for(const [c,v] of Object.entries(state.prepost)){
    if(c==="custom") outcomes.push({construct:"custom", label_he:v.label||"מדד מותאם", direction:v.direction, primary:v.primary});
    else outcomes.push({construct:c, direction:v.direction, primary:v.primary});
  }
  if($("po_acceptability").checked) outcomes.push({construct:"acceptability"});
  if($("po_perceived_change").checked) outcomes.push({construct:"perceived_change"});
  if($("po_felt_change").checked) outcomes.push({construct:"felt_change"});
  return {
    intake_version:"1.2", ui_language:LANG,
    study:{ title_he:"", collaborator:$("collaborator").value.trim(), pi:"Elad Refoua", coordinator:"Yuval Holzman",
      population_he:$("population").value.trim(), setting_he:$("setting").value.trim(),
      language:$("language").value, n_estimate:Number($("n").value)||null, when:$("when").value.trim(),
      research_value:$("researchValue").value.trim(),
      funding:{ has: state.funding==="yes", source: state.funding==="yes"?$("fundingSource").value.trim():"" } },
    practice:{ has_simulation: state.sim!=null && state.sim!=="other" ? true : (state.sim==="other"),
      sim_choice: state.sim, sim_name: simName(), sim_uuid:"", n_sessions: $("nSessions").value, goal_he:$("goal").value.trim() },
    outcomes,
    existing_scales:{ have: state.haveScales==="yes", note:$("scalesNote").value.trim() },
    design:{ timing: state.timing, control_group: state.control==="yes" },
    demographics:[...state.demog], qualitative:true, notes_he:$("notes").value.trim()
  };
}
$("submit").onclick=()=>{ const a=buildAnswers(); window.__ANSWERS__=a;
  $("json").textContent=JSON.stringify(a,null,2); $("out").classList.remove("hidden"); $("out").scrollIntoView({behavior:"smooth"}); };
$("download").onclick=()=>{ const blob=new Blob([JSON.stringify(window.__ANSWERS__,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download="answers.json"; a.click(); URL.revokeObjectURL(u); };
$("copy").onclick=()=>{ navigator.clipboard.writeText($("json").textContent);
  $("copy").textContent="✓"; setTimeout(()=>$("copy").textContent=T[LANG].btn_copy,1500); };

applyLang("he");
</script>
</body>
</html>
